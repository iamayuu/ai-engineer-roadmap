<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Engineer Roadmap — 12-Week Plan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="noise-overlay"></div>

    <header class="site-header">
      <div class="header-inner">
        <div class="header-left">
          <div class="logo-mark">
            <span class="logo-icon">⬡</span>
            <span class="logo-text">AI Roadmap for Ayuuu</span>
          </div>
          <div class="header-meta">
            <span class="meta-pill">12 Weeks</span>
            <span class="meta-pill">84 Days</span>
            <span class="meta-pill">~200 Hours</span>
          </div>
        </div>
        <div class="header-right">
          <div class="progress-ring-container">
            <svg class="progress-ring" width="64" height="64" viewBox="0 0 64 64">
              <circle class="ring-bg" cx="32" cy="32" r="26" fill="none" stroke-width="4" />
              <circle class="ring-fill" id="ringFill" cx="32" cy="32" r="26" fill="none" stroke-width="4" stroke-dasharray="163.4" stroke-dashoffset="163.4" />
            </svg>
            <div class="ring-label">
              <span id="doneCount">0</span>
              <small>/ <span id="totalCount">0</span></small>
            </div>
          </div>
          <div class="header-stats">
            <div class="stat-item"><span class="stat-num" id="pctDone">0%</span><span class="stat-label">Complete</span></div>
            <div class="stat-item"><span class="stat-num" id="daysLeft">84</span><span class="stat-label">Days left</span></div>
          </div>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <div class="toolbar-inner">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="searchInput" class="search-input" placeholder="Search topics, tools, days…" oninput="applyFilters()" />
        </div>
        <div class="sync-group" role="group" aria-label="Backup progress">
          <button type="button" class="sync-btn" onclick="exportProgress()" title="Copy progress JSON to clipboard">Export</button>
          <button type="button" class="sync-btn" onclick="openImportDialog()" title="Paste JSON from another device">Import</button>
        </div>
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" data-filter="python" onclick="setFilter('python', this)">🐍 Python</button>
          <button class="filter-btn" data-filter="dl" onclick="setFilter('dl', this)">🧠 Deep Learning</button>
          <button class="filter-btn" data-filter="llm" onclick="setFilter('llm', this)">💬 LLMs</button>
          <button class="filter-btn" data-filter="mlops" onclick="setFilter('mlops', this)">⚙️ MLOps</button>
          <button class="filter-btn" data-filter="cv" onclick="setFilter('cv', this)">👁️ Computer Vision</button>
          <button class="filter-btn" data-filter="sysdesign" onclick="setFilter('sysdesign', this)">🏗️ System Design</button>
          <button class="filter-btn" data-filter="project" onclick="setFilter('project', this)">🛠️ Project</button>
          <button class="filter-btn" data-filter="revision" onclick="setFilter('revision', this)">🔄 Revision</button>
        </div>
      </div>
    </div>

    <main class="main-content">
      <div class="table-scroll-wrap">
        <table class="roadmap-table" id="roadmapTable">
          <thead>
            <tr>
              <th class="col-check"></th>
              <th class="col-day">Day</th>
              <th class="col-topic">Topic</th>
              <th class="col-tasks">Tasks</th>
              <th class="col-tags">Tags</th>
              <th class="col-resources">Resources</th>
              <th class="col-hrs">Hrs</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </main>

    <footer class="site-footer">
      <p>Built for focus. Track daily, ship weekly. <span id="footerDate"></span></p>
    </footer>

    <dialog id="importDialog" class="import-dialog">
      <form method="dialog" class="import-dialog-form" onsubmit="return false">
        <h2 class="import-dialog-title">Import progress</h2>
        <p class="import-dialog-hint">Paste JSON from <strong>Export</strong> on another device. This replaces progress in this browser.</p>
        <textarea id="importTextarea" class="import-textarea" rows="10" placeholder='{"version":2,"doneTasks":["1:0","1:1"],...}' spellcheck="false"></textarea>
        <p id="importError" class="import-error" hidden></p>
        <div class="import-dialog-actions">
          <button type="button" class="sync-btn sync-btn--ghost" onclick="closeImportDialog()">Cancel</button>
          <button type="button" class="sync-btn sync-btn--primary" onclick="applyImport()">Apply import</button>
        </div>
      </form>
    </dialog>

    <div id="syncToast" class="sync-toast" role="status" aria-live="polite" hidden></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
